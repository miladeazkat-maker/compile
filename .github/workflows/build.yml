name: compile

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure Developer Command Prompt for VC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Download ImGui Dependencies Automatically
      run: |
        git clone --depth 1 https://github.com/ocornut/imgui.git imgui

    - name: Compile Addon using MSVC
      run: |
        cl.exe /O2 /LD /std:c++17 /I . /I ./imgui /D "NDEBUG" addon_var.cpp /link /OUT:VAR_Offside_System.addon /SUBSYSTEM:WINDOWS /MACHINE:X64 user32.lib gdi32.lib

    - name: Upload Compiled Addon Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VAR_Offside_System_Build
        path: VAR_Offside_System.addon
