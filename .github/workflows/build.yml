name: Build Custom ReShade Addon (v6.7.3)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure Developer Command Prompt for VC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Compile Addon using MSVC
      run: |
        cl.exe /O2 /LD /std:c++17 /I. /D "NDEBUG" addon_var.cpp /link /OUT:VAR_Offside_System.addon /SUBSYSTEM:WINDOWS /MACHINE:X64 user32.lib gdi32.lib

    - name: Upload Compiled Addon Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PES2021-VAR-Addon-v6.7.3
        path: VAR_Offside_System.addon
