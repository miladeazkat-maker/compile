name: Build ReShade Addon
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC Compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download All ReShade Headers Automatically
        run: |
          curl.exe -sL https://raw.githubusercontent.com/crosire/reshade/main/include/reshade.hpp -o reshade.hpp
          curl.exe -sL https://raw.githubusercontent.com/crosire/reshade/main/include/reshade_events.hpp -o reshade_events.hpp
          curl.exe -sL https://raw.githubusercontent.com/crosire/reshade/main/include/reshade_overlay.hpp -o reshade_overlay.hpp

      - name: Compile Addon
        run: |
          cl.exe /O2 /LD /EHsc /std:c++17 /I. FoxMemoryBridge.cpp /link /OUT:FoxBridge.addon user32.lib kernel32.lib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoxBridge-Addon
          path: FoxBridge.addon
