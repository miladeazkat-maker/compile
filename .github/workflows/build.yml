name: Build ReShade Addon
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC Compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile Addon
        run: |
          cl.exe /O2 /LD /EHsc FoxMemoryBridge.cpp /link /OUT:FoxBridge.addon user32.lib kernel32.lib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoxBridge-Addon
          path: FoxBridge.addon
